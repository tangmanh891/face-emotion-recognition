services:
  app:
    build: .
    image: face-emotion-recognition:latest
    container_name: face-emotion-app
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - TF_USE_LEGACY_KERAS=1
      - TF_CPP_MIN_LOG_LEVEL=2
      # Switch to 'haar' to fall back to OpenCV Haar Cascade.
      - EMOTION_FACE_BACKEND=mediapipe
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
