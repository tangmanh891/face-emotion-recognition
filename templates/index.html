<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận diện Cảm xúc Khuôn mặt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0/dist/chart.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">😊 Nhận diện Cảm xúc Khuôn mặt</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12 text-center mb-4">
                <h2>Face Emotion Recognition System</h2>
                <p class="text-muted">Upload ảnh hoặc sử dụng webcam để nhận diện cảm xúc</p>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="upload-tab" data-bs-toggle="tab" 
                        data-bs-target="#upload" type="button" role="tab">
                    📁 Upload Ảnh
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="webcam-tab" data-bs-toggle="tab" 
                        data-bs-target="#webcam" type="button" role="tab">
                    📹 Webcam
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content">
            <!-- Upload Tab -->
            <div class="tab-pane fade show active" id="upload" role="tabpanel">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Chọn ảnh</h5>
                                <input type="file" id="imageUpload" accept="image/*" class="form-control mb-3">
                                <button id="detectBtn" class="btn btn-primary w-100">
                                    🔍 Nhận diện
                                </button>
                            </div>
                        </div>
                        
                        <div id="results" class="card mt-3" style="display: none;">
                            <div class="card-body">
                                <h5 class="card-title">Kết quả</h5>
                                <div id="resultText"></div>
                                <canvas id="emotionChart" width="400" height="300"></canvas>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5 class="card-title">Preview</h5>
                                <img id="preview" src="" alt="Preview" style="max-width: 100%; display: none;">
                                <p id="previewText" class="text-muted">Chưa có ảnh</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Webcam Tab -->
            <div class="tab-pane fade" id="webcam" role="tabpanel">
                <div class="row">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5 class="card-title">Webcam</h5>
                                <video id="video" width="640" height="480" autoplay style="display: none;"></video>
                                <canvas id="canvas" width="640" height="480"></canvas>
                                <div class="mt-3">
                                    <button id="startWebcam" class="btn btn-success">
                                        ▶️ Bắt đầu
                                    </button>
                                    <button id="stopWebcam" class="btn btn-danger" style="display: none;">
                                        ⏹️ Dừng
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Thống kê Real-time</h5>
                                <div id="webcamResults">
                                    <p class="text-muted">Chưa có dữ liệu</p>
                                </div>
                                <canvas id="webcamChart" width="300" height="200"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 mb-3 text-muted">
        <p>Face Emotion Recognition System - Powered by TensorFlow & OpenCV</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
